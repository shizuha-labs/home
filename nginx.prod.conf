server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }


    # Home BFF API (HIVE-375): route API calls to the sibling FastAPI backend
    # instead of the SPA fallback. The backend forwards the caller Bearer to
    # downstream services and returns an always-200 partial widget envelope.
    # Org-progress dashboard is a heavier analytics fan-out (per-item transition
    # scan for throughput/dwell) than the 5s summary widgets — give it a longer
    # read budget so a busy org degrades gracefully in the BFF rather than
    # surfacing a hard 504 here. Longest-prefix match wins over /api/home/.
    location /api/home/progress {
        proxy_pass http://shizuha-home-backend.shizuha.svc.cluster.local:8031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 20s;
        proxy_connect_timeout 1s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 18s;
    }

    location /api/home/ {
        proxy_pass http://shizuha-home-backend.shizuha.svc.cluster.local:8031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        proxy_connect_timeout 1s;
        # EndpointSlice removal is asynchronous during involuntary node loss.
        # Retry a fresh Service connection instead of surfacing a transient
        # connect timeout from a just-terminated backend as a 504.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 4s;
    }

    # Public research-intent API (VEN-134): keep POSTs out of nginx's static
    # file handler and send them to the sibling FastAPI backend. The backend
    # persists intent-only audit leads and returns no-payment/no-fulfillment JSON.
    location ~ ^/api/research(/|$) {
        proxy_pass http://shizuha-home-backend.shizuha.svc.cluster.local:8031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        proxy_connect_timeout 1s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 4s;
    }

    # VEN-194: privacy-safe Books Compliance endpoints must always reach the
    # JSON backend and can never fall through to the SPA index document.
    location ^~ /api/books/compliance/ {
        proxy_pass http://shizuha-home-backend.shizuha.svc.cluster.local:8031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        proxy_connect_timeout 1s;
        client_max_body_size 8k;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 4s;
    }

    # Confirmation bearer links arrive in the query string. They must never
    # enter nginx access logs, and a GET only renders the no-op confirmation UI.
    location = /books/compliance/confirmation {
        access_log off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Referrer-Policy "no-referrer" always;
        try_files /books/compliance/confirmation/index.html =404;
    }
    location = /books/compliance/confirmation/ {
        access_log off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Referrer-Policy "no-referrer" always;
        try_files /books/compliance/confirmation/index.html =404;
    }

    # JS/CSS must revalidate so browsers do not keep stale UI after CI deploys.
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Fingerprinted media/font assets can remain long-lived.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HIVE-567: serve the PWA web manifest as application/manifest+json instead of
    # the application/octet-stream nginx infers from the unknown `.webmanifest`
    # extension (mime.types has no entry for it) — an octet-stream manifest is
    # invalid and breaks PWA install. The app links /site.webmanifest
    # (public/site.webmanifest, shipped in the bundle); /manifest.json is aliased
    # to the same file so PWA tooling that probes the conventional path gets valid
    # JSON instead of the SPA index.html fallback. Exact-match (=) beats the SPA
    # `location /` below. (Favicon is /favicon.svg per HIVE-513 — the app no longer
    # references /favicon.png, so that path is intentionally not served.)
    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.json {
        alias /usr/share/nginx/html/site.webmanifest;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # VEN-166: serve static landing pages (e.g. shizuha-roast) as plain HTML
    # instead of the SPA index.html fallback. The directory is copied into
    # /usr/share/nginx/html by the Dockerfile (frontend/public/ → dist/).
    location /shizuha-roast/ {
        try_files $uri $uri/index.html =404;
    }

    # SPA routing - serve index.html for all routes
    # Home serves at root /, so no base path handling needed
    location / {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
