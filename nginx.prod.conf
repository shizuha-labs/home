server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }


    # Home BFF API (HIVE-375): route API calls to the sibling FastAPI backend
    # instead of the SPA fallback. The backend forwards the caller Bearer to
    # downstream services and returns an always-200 partial widget envelope.
    location /api/home/ {
        proxy_pass http://shizuha-home-backend.shizuha.svc.cluster.local:8031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        proxy_connect_timeout 1s;
    }

    # Public research-intent API (VEN-134): keep POSTs out of nginx's static
    # file handler and send them to the sibling FastAPI backend. The backend
    # persists intent-only audit leads and returns no-payment/no-fulfillment JSON.
    location ~ ^/api/research(/|$) {
        proxy_pass http://shizuha-home-backend.shizuha.svc.cluster.local:8031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
        proxy_connect_timeout 1s;
    }

    # JS/CSS must revalidate so browsers do not keep stale UI after CI deploys.
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Fingerprinted media/font assets can remain long-lived.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HIVE-567: serve the PWA web manifest as application/manifest+json instead of
    # the application/octet-stream nginx infers from the unknown `.webmanifest`
    # extension (mime.types has no entry for it) — an octet-stream manifest is
    # invalid and breaks PWA install. The app links /site.webmanifest
    # (public/site.webmanifest, shipped in the bundle); /manifest.json is aliased
    # to the same file so PWA tooling that probes the conventional path gets valid
    # JSON instead of the SPA index.html fallback. Exact-match (=) beats the SPA
    # `location /` below. (Favicon is /favicon.svg per HIVE-513 — the app no longer
    # references /favicon.png, so that path is intentionally not served.)
    location = /site.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.json {
        alias /usr/share/nginx/html/site.webmanifest;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # SPA routing - serve index.html for all routes
    # Home serves at root /, so no base path handling needed
    location / {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
