<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shizuha - The Unified Platform for Work" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Favicons — only assets that actually exist in public/ (missing refs
         made the tab icon 404 and the manifest serve the SPA shell as HTML,
         breaking PWA install with 'Manifest: syntax error'). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shizuha" />
    <meta property="og:description" content="The Unified Platform for Work" />
    <meta name="twitter:card" content="summary" />
    <title>Shizuha</title>

    <!-- VEN-148: Plausible Analytics for the Forge API launch funnel.
         Domain-level install lets /forge/pricing pageviews and custom funnel
         goals resolve in the same Plausible dashboard. -->
    <script>
      window.plausible = window.plausible || function() {
        (window.plausible.q = window.plausible.q || []).push(arguments)
      }
    </script>
    <script defer data-domain="shizuha.com" src="https://plausible.io/js/script.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
