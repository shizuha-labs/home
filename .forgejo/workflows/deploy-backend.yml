# Shizuha Origin CI/CD — MULTI-ARCH build + deploy shizuha-home-BACKEND.
# HIVE-460: backend was applied ad-hoc (amd64-only, no tracked manifest).
# This pipeline builds a multi-arch manifest list (amd64 + arm64) via kaniko
# and rolls out shizuha-home-backend in the shizuha namespace.
#
# Build context: backend/ subdirectory only (FastAPI/Python — no monorepo needed).
# Mirrors the deploy-frontend.yml pattern (KUBE_CONFIG_B64 + kaniko jobs).
name: deploy-shizuha-home-backend
on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
concurrency:
  group: deploy-shizuha-home-backend-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install kubectl + cluster access
        run: |
          set -euo pipefail
          KUBECTL_ARCH=$(uname -m); case "$KUBECTL_ARCH" in x86_64) KUBECTL_ARCH=amd64;; aarch64) KUBECTL_ARCH=arm64;; esac
          curl -fsSLO "https://dl.k8s.io/release/v1.30.0/bin/linux/${KUBECTL_ARCH}/kubectl"
          install -m 0755 kubectl /usr/local/bin/kubectl
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Multi-arch build + deploy + verify (backend)
        run: |
          set -euo pipefail
          SHORT="$(echo "${{ github.sha }}" | cut -c1-7)"
          BTAG="home-backend-${SHORT}"
          REG="registry.registry.svc.cluster.local:5000"
          echo "Multi-arch build shizuha-home-backend:${BTAG} (amd64 + arm64)"

          render_build_job() {  # $1=arch
            local ARCH="$1"
            cat <<YAML
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ci-build-home-backend-${SHORT}-${ARCH}
            namespace: build
            labels: { app: ci-build, service: home-backend }
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 900
            template:
              spec:
                restartPolicy: Never
                nodeSelector: { kubernetes.io/arch: ${ARCH} }
                tolerations:
                  - { key: node.shizuha/workstation, operator: Exists, effect: NoSchedule }
                  - { key: shizuha.com/inference-paused, operator: Exists, effect: NoSchedule }
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                      - matchExpressions:
                        - { key: node-role.kubernetes.io/control-plane, operator: DoesNotExist }
                initContainers:
                  - name: git-clone
                    image: alpine/git:2.43.0
                    command: ["/bin/sh","-c"]
                    args:
                      - |
                        set -e
                        git clone --depth=50 https://x-token-auth:\${GIT_PASSWORD}@github.com/shizuha-labs/home.git /workspace/src
                        cd /workspace/src && (git checkout ${{ github.sha }} 2>/dev/null || echo "sha not in shallow clone; building default HEAD")
                    env:
                      - name: GIT_PASSWORD
                        valueFrom: { secretKeyRef: { name: github-token, key: password } }
                    volumeMounts: [{ mountPath: /workspace, name: workspace }]
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:v1.23.2
                    args:
                      - --context=dir:///workspace/src/backend
                      - --dockerfile=/workspace/src/backend/Dockerfile
                      - --destination=${REG}/shizuha-home-backend:${BTAG}-${ARCH}
                      - --insecure
                      - --skip-tls-verify
                      - --insecure-pull
                      - --registry-mirror=mirror-dockerhub.registry.svc.cluster.local:5000
                      - --build-arg=PIP_INDEX_URL=http://pip-cache.registry.svc.cluster.local/simple/
                      - --build-arg=PIP_TRUSTED_HOST=pip-cache.registry.svc.cluster.local
                      - --cache=false
                    volumeMounts: [{ mountPath: /workspace, name: workspace }]
                volumes: [{ emptyDir: {}, name: workspace }]
          YAML
          }

          render_build_job amd64 | kubectl apply -f -
          render_build_job arm64 | kubectl apply -f -

          wait_job() {
            local ARCH="$1"
            local JOB="ci-build-home-backend-${SHORT}-${ARCH}"
            kubectl wait -n build --for=condition=complete "job/${JOB}" --timeout=1800s &
            local WP=$!
            while kill -0 "$WP" 2>/dev/null; do
              if kubectl get "job/${JOB}" -n build -o jsonpath='{.status.failed}' | grep -q '[1-9]'; then
                echo "::error::kaniko backend ${ARCH} build failed"
                kubectl logs -n build "job/${JOB}" --all-containers --tail=80 || true
                exit 1
              fi
              sleep 5
            done
            wait "$WP"
          }
          wait_job amd64
          wait_job arm64

          cat <<YAML | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ci-manifest-home-backend-${SHORT}
            namespace: build
            labels: { app: ci-manifest, service: home-backend }
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 900
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: crane
                    image: gcr.io/go-containerregistry/crane:latest
                    args:
                      - index
                      - append
                      - --insecure
                      - -t
                      - ${REG}/shizuha-home-backend:${BTAG}
                      - -m
                      - ${REG}/shizuha-home-backend:${BTAG}-amd64
                      - -m
                      - ${REG}/shizuha-home-backend:${BTAG}-arm64
          YAML
          kubectl wait -n build --for=condition=complete "job/ci-manifest-home-backend-${SHORT}" --timeout=300s || {
            echo "::error::backend manifest combine failed"
            kubectl logs -n build "job/ci-manifest-home-backend-${SHORT}" --tail=80 || true
            exit 1
          }

          kubectl set image -n shizuha deploy/shizuha-home-backend backend="localhost:30500/shizuha-home-backend:${BTAG}"
          kubectl rollout status -n shizuha deploy/shizuha-home-backend --timeout=300s

          LIVE="$(kubectl get deploy -n shizuha shizuha-home-backend -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "Live backend image: ${LIVE}"
          echo "${LIVE}" | grep -q "${BTAG}" || { echo "::error::backend image mismatch"; exit 1; }
          kubectl get pods -n shizuha -l app.kubernetes.io/name=shizuha-home-backend
