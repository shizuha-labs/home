# Shizuha Origin CI/CD — MULTI-ARCH build + deploy shizuha-home-BACKEND.
# HIVE-460: backend was applied ad-hoc (amd64-only, no tracked manifest).
# This pipeline builds a multi-arch manifest list (amd64 + arm64) via kaniko
# and rolls out shizuha-home-backend in the shizuha namespace.
#
# Build context: backend/ subdirectory only (FastAPI/Python — no monorepo needed).
# Mirrors the deploy-frontend.yml pattern (KUBE_CONFIG_B64 + kaniko jobs).
name: deploy-shizuha-home-backend
on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    # Deploy-status is repo-SHA based: every mapped deployment for this repo
    # must be stamped with the current commit. Rebuild the lightweight backend
    # on all pushes so frontend/installer-only commits do not leave a permanent
    # partial-lag row.
  # HIVE-652: run the authz invariant as a PR merge gate. The deploy job below
  # is push/manual only, so a pull request can prove isolation without shipping.
  pull_request:
    branches: [main, master]
concurrency:
  group: deploy-shizuha-home-backend-${{ github.ref }}
  cancel-in-progress: true
jobs:
  authz-invariant:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    steps:
      # HIVE-652/HOME deploy-backend: this job intentionally runs inside
      # python:3.12-slim for a small, deterministic authz gate. JS actions such
      # as actions/checkout require `node` inside the job container, which the
      # Python slim image does not provide; run an exact-revision shell checkout
      # instead so the gate works without broadening the image/toolchain.
      - name: Checkout exact revision without node-based actions
        # HIVE-681/SRCH-17: act_runner does not reliably expose the automatic
        # token to shell steps unless it is bound explicitly.  The live Origin
        # server URL is also an internal http:// Service, so preserve the scheme
        # instead of only rewriting https:// URLs.
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends ca-certificates git
          [ -n "${GITHUB_TOKEN:-}" ] || { echo "::error::Forgejo workflow token is unavailable"; exit 1; }
          SERVER_URL="${GITHUB_SERVER_URL:-https://origin.shizuha.com}"
          SERVER_URL="${SERVER_URL%/}"
          REPOSITORY="${GITHUB_REPOSITORY:-shizuha-labs/home}"
          case "$SERVER_URL" in
            http://*) REPO_URL="http://x-access-token:${GITHUB_TOKEN}@${SERVER_URL#http://}/${REPOSITORY}.git" ;;
            https://*) REPO_URL="https://x-access-token:${GITHUB_TOKEN}@${SERVER_URL#https://}/${REPOSITORY}.git" ;;
            *) echo "::error::Unsupported Forgejo server URL scheme"; exit 1 ;;
          esac
          git init .
          git remote add origin "$REPO_URL"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
      - name: Run Home BFF organization-isolation gate
        run: |
          set -euo pipefail
          python -m pip install --quiet --no-cache-dir \
            --index-url "${PIP_INDEX_URL:-http://pip-cache.registry.svc.cluster.local/simple/}" \
            --trusted-host "${PIP_TRUSTED_HOST:-pip-cache.registry.svc.cluster.local}" \
            -r backend/requirements.txt
          cd backend
          # Keep this trust-boundary gate limited to organization-isolation
          # invariants. Unrelated SSE capacity/lifecycle coverage runs in the
          # service test lane and must not make this authz proof nondeterministic.
          python -m pytest -q \
            tests/test_summary.py::test_requesting_foreign_org_is_403 \
            tests/test_summary.py::test_two_org_authz_matrix_rejects_selectors_and_stale_claim_cache \
            tests/test_summary.py::test_widget_cache_does_not_serve_stale_over_unauthorized \
            tests/test_summary.py::test_financial_cache_revalidates_books_authz_inside_fresh_ttl \
            tests/test_activity.py::test_activity_foreign_org_is_403 \
            tests/test_activity.py::test_activity_two_org_cache_and_selector_isolation \
            tests/test_activity.py::test_activity_recent_single_org_foreign_org_is_403 \
            tests/test_activity.py::test_activity_recent_aggregate_excludes_non_member_orgs \
            tests/test_activity.py::test_activity_stream_foreign_org_is_403 \
            tests/test_activity.py::test_parse_entry_drops_wrong_org \
            tests/test_activity.py::test_activity_recent_aggregate_excludes_deauth_org_events

  build-and-deploy:
    needs: authz-invariant
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact triggering revision for monotonic release guard
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install kubectl + cluster access
        run: |
          set -euo pipefail
          KUBECTL_ARCH=$(uname -m); case "$KUBECTL_ARCH" in x86_64) KUBECTL_ARCH=amd64;; aarch64) KUBECTL_ARCH=arm64;; esac
          curl -fsSLO "https://dl.k8s.io/release/v1.30.0/bin/linux/${KUBECTL_ARCH}/kubectl"
          install -m 0755 kubectl /usr/local/bin/kubectl
          mkdir -p "$HOME/.kube"
          printf '%s' "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Multi-arch build + deploy + verify (backend)
        run: |
          set -euo pipefail
          SHORT="$(echo "${{ github.sha }}" | cut -c1-7)"
          BTAG="home-backend-${SHORT}"
          BOOTSTRAP_TAG="home-backend-bootstrap"
          REG="registry.registry.svc.cluster.local:5000"
          echo "Multi-arch build shizuha-home-backend:${BTAG} (amd64 + arm64)"

          render_build_job() {  # $1=arch
            local ARCH="$1"
            cat <<YAML
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ci-build-home-backend-${SHORT}-${ARCH}
            namespace: build
            labels: { app: ci-build, service: home-backend }
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 900
            template:
              spec:
                restartPolicy: Never
                nodeSelector: { kubernetes.io/arch: ${ARCH} }
                tolerations:
                  - { key: node.shizuha/workstation, operator: Exists, effect: NoSchedule }
                  - { key: shizuha.com/inference-paused, operator: Exists, effect: NoSchedule }
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                      - matchExpressions:
                        - { key: node-role.kubernetes.io/control-plane, operator: DoesNotExist }
                initContainers:
                  - name: git-clone
                    image: alpine/git:2.43.0
                    command: ["/bin/sh","-c"]
                    args:
                      - |
                        set -e
                        git clone --depth=50 https://x-token-auth:\${GIT_PASSWORD}@github.com/shizuha-labs/home.git /workspace/src
                        cd /workspace/src && (git checkout ${{ github.sha }} 2>/dev/null || echo "sha not in shallow clone; building default HEAD")
                    env:
                      - name: GIT_PASSWORD
                        valueFrom: { secretKeyRef: { name: github-token, key: password } }
                    volumeMounts: [{ mountPath: /workspace, name: workspace }]
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:v1.23.2
                    args:
                      - --context=dir:///workspace/src/backend
                      - --dockerfile=/workspace/src/backend/Dockerfile
                      - --destination=${REG}/shizuha-home-backend:${BTAG}-${ARCH}
                      - --destination=${REG}/shizuha-home-backend:${BOOTSTRAP_TAG}-${ARCH}
                      - --insecure
                      - --skip-tls-verify
                      - --insecure-pull
                      - --registry-mirror=mirror-dockerhub.registry.svc.cluster.local:5000
                      - --build-arg=PIP_INDEX_URL=http://pip-cache.registry.svc.cluster.local/simple/
                      - --build-arg=PIP_TRUSTED_HOST=pip-cache.registry.svc.cluster.local
                      - --cache=false
                    volumeMounts: [{ mountPath: /workspace, name: workspace }]
                volumes: [{ emptyDir: {}, name: workspace }]
          YAML
          }

          render_build_job amd64 | kubectl apply -f -
          render_build_job arm64 | kubectl apply -f -

          wait_job() {
            local ARCH="$1"
            local JOB="ci-build-home-backend-${SHORT}-${ARCH}"
            kubectl wait -n build --for=condition=complete "job/${JOB}" --timeout=1800s &
            local WP=$!
            while kill -0 "$WP" 2>/dev/null; do
              if kubectl get "job/${JOB}" -n build -o jsonpath='{.status.failed}' | grep -q '[1-9]'; then
                echo "::error::kaniko backend ${ARCH} build failed"
                kubectl logs -n build "job/${JOB}" --all-containers --tail=80 || true
                exit 1
              fi
              sleep 5
            done
            wait "$WP"
          }
          wait_job amd64
          wait_job arm64

          cat <<YAML | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ci-manifest-home-backend-${SHORT}
            namespace: build
            labels: { app: ci-manifest, service: home-backend }
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 900
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: crane
                    image: gcr.io/go-containerregistry/crane:latest
                    args:
                      - index
                      - append
                      - --insecure
                      - -t
                      - ${REG}/shizuha-home-backend:${BTAG}
                      - -m
                      - ${REG}/shizuha-home-backend:${BTAG}-amd64
                      - -m
                      - ${REG}/shizuha-home-backend:${BTAG}-arm64
          YAML
          kubectl wait -n build --for=condition=complete "job/ci-manifest-home-backend-${SHORT}" --timeout=300s || {
            echo "::error::backend manifest combine failed"
            kubectl logs -n build "job/ci-manifest-home-backend-${SHORT}" --tail=80 || true
            exit 1
          }

          cat <<YAML | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ci-manifest-home-backend-bootstrap-${SHORT}
            namespace: build
            labels: { app: ci-manifest, service: home-backend }
          spec:
            backoffLimit: 0
            ttlSecondsAfterFinished: 900
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: crane
                    image: gcr.io/go-containerregistry/crane:latest
                    args:
                      - index
                      - append
                      - --insecure
                      - -t
                      - ${REG}/shizuha-home-backend:${BOOTSTRAP_TAG}
                      - -m
                      - ${REG}/shizuha-home-backend:${BOOTSTRAP_TAG}-amd64
                      - -m
                      - ${REG}/shizuha-home-backend:${BOOTSTRAP_TAG}-arm64
          YAML
          kubectl wait -n build --for=condition=complete "job/ci-manifest-home-backend-bootstrap-${SHORT}" --timeout=300s || {
            echo "::error::backend bootstrap manifest combine failed"
            kubectl logs -n build "job/ci-manifest-home-backend-bootstrap-${SHORT}" --tail=80 || true
            exit 1
          }

          set +e
          .forgejo/scripts/monotonic-release-guard.sh shizuha shizuha-home-backend "${{ github.sha }}"
          GUARD_RC="$?"
          set -e
          if [ "${GUARD_RC}" = 10 ]; then exit 0; fi
          if [ "${GUARD_RC}" != 0 ]; then exit "${GUARD_RC}"; fi
          kubectl set image -n shizuha deploy/shizuha-home-backend backend="localhost:30500/shizuha-home-backend:${BTAG}"
          kubectl rollout status -n shizuha deploy/shizuha-home-backend --timeout=300s

          LIVE="$(kubectl get deploy -n shizuha shizuha-home-backend -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "Live backend image: ${LIVE}"
          echo "${LIVE}" | grep -q "${BTAG}" || { echo "::error::backend image mismatch"; exit 1; }
          kubectl annotate -n shizuha deploy/shizuha-home-backend shizuha.io/last-successful-sha="${{ github.sha }}" --overwrite
          kubectl get pods -n shizuha -l app.kubernetes.io/name=shizuha-home-backend

